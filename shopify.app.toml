# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "REPLACE_WITH_YOUR_CLIENT_ID"
name = "ReleasitNuevo"
application_url = "https://localhost:3000"
embedded = true

[access_scopes]
scopes = "write_orders,read_orders,write_draft_orders,read_draft_orders,read_products,write_products,read_customers,write_customers"

[auth]
redirect_urls = [ "https://localhost:3000/auth/callback" ]

[webhooks]
api_version = "2024-10"

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://localhost:3000/webhooks"
  customer_data_request_url = "https://localhost:3000/webhooks"
  shop_deletion_url = "https://localhost:3000/webhooks"

[app_proxy]
url = "https://localhost:3000/api/proxy"
subpath = "releasitnuevo"
prefix = "apps"

[pos]
embedded = false
